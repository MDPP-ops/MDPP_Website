<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWO SIA Textile &amp; Fashion Research Network</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg:          #1a1a2e;
    --panel:       #16213e;
    --panel2:      #0f3460;
    --border:      #2a2a5a;
    --text:        #e0e0f0;
    --text-dim:    #8888aa;
    --accent:      #f5a623;
    --accent2:     #4a90d9;
    --green:       #4caf50;
    --red:         #e53935;
    --purple:      #9c27b0;
    --teal:        #00bcd4;
    --pink:        #e91e63;
    --orange:      #ff5722;
    --node-proj:   #f5a623;
    --node-inst:   #4a90d9;
    --link:        #3a3a6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  header .subtitle { font-size: 11px; color: var(--text-dim); }
  #stats { margin-left: auto; font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  /* ── Layout ── */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 220px;
    min-width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-track { background: var(--panel); }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Search */
  .search-wrap {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 5px 8px;
    font-size: 12px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }

  /* Section headers */
  .section-hd {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 4px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-hd button {
    font-size: 9px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 3px;
    padding: 1px 5px;
    cursor: pointer;
  }
  .section-hd button:hover { color: var(--text); border-color: var(--text-dim); }

  /* Checkboxes */
  .check-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 4px;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
  }
  .check-row:hover { background: var(--panel2); }
  .check-row input[type=checkbox] { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .check-row label {
    flex: 1;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .check-row .badge {
    font-size: 9px;
    background: var(--panel2);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 0 5px;
    flex-shrink: 0;
  }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }

  /* Display toggles */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 4px;
  }
  .toggle-row label { font-size: 11px; color: var(--text-dim); }

  /* Legend */
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 4px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Graph canvas ── */
  #graph-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  svg#graph {
    width: 100%;
    height: 100%;
    background: var(--bg);
  }

  /* ── Tooltip ── */
  #tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    max-width: 300px;
    pointer-events: none;
    display: none;
    z-index: 100;
    line-height: 1.5;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #tooltip h3 { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
  #tooltip .tt-meta { font-size: 11px; color: var(--text-dim); }
  #tooltip .tt-terms { font-size: 10px; color: var(--teal); margin-top: 4px; }
  #tooltip a { color: var(--accent2); font-size: 11px; }

  /* ── No-data message ── */
  #no-data {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text-dim);
  }
  #no-data h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  #no-data p  { font-size: 13px; margin-bottom: 12px; }
  #file-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 5px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #file-btn:hover { opacity: 0.85; }
  #file-input { display: none; }
  #load-error { color: var(--red); font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>NWO SIA · Textile &amp; Fashion Research Network</h1>
    <div class="subtitle">Force-directed graph · projects ↔ institutions</div>
  </div>
  <div id="stats">Loading…</div>
</header>

<div class="main-layout">
  <!-- ── Sidebar ── -->
  <aside>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search projects…">
    </div>
    <div class="sidebar-scroll">

      <!-- Funding types -->
      <div class="section-hd">
        Funding type
        <button id="btn-all-fund">all</button>
      </div>
      <div id="fund-checks"></div>

      <hr class="divider">

      <!-- Keywords -->
      <div class="section-hd">
        Keywords
        <button id="btn-all-kw">all</button>
      </div>
      <div id="kw-checks"></div>

      <hr class="divider">

      <!-- Display toggles -->
      <div class="section-hd">Display</div>
      <div class="toggle-row">
        <input type="checkbox" id="show-labels" checked>
        <label for="show-labels">Project labels</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="show-inst" checked>
        <label for="show-inst">Institutions</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="show-orphan">
        <label for="show-orphan">Orphan institutions</label>
      </div>

      <hr class="divider">

      <!-- Legend -->
      <div class="section-hd">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f5a623"></div> NWA</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e53935"></div> RAAK-Pro</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9c27b0"></div> RAAK-MKB</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div> RAAK-Publiek</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00bcd4"></div> KIEM</div>
      <div class="legend-item"><div class="legend-dot" style="background:#78909c"></div> Other</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4a90d9; border: 1px solid #aaa"></div> Institution</div>
    </div>
  </aside>

  <!-- ── Graph ── -->
  <div id="graph-wrap">
    <svg id="graph"></svg>
    <div id="no-data">
      <h2>No data loaded</h2>
      <p>Drag &amp; drop <code>nwo_fashion_textile_filtered.json</code> here,<br>or click the button below.</p>
      <button id="file-btn">Open JSON file</button>
      <input type="file" id="file-input" accept=".json">
      <div id="load-error"></div>
    </div>
    <div id="tooltip"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  Guard: ensure D3 loaded
// ═══════════════════════════════════════════════════════════════
if (typeof d3 === 'undefined') {
  document.getElementById('no-data').innerHTML =
    '<h2 style="color:#e53935">D3.js failed to load</h2>' +
    '<p>Check your internet connection and reload.<br>' +
    'D3 is loaded from <code>https://d3js.org/d3.v7.min.js</code></p>';
  throw new Error('D3 not available');
}

// ═══════════════════════════════════════════════════════════════
//  Constants
// ═══════════════════════════════════════════════════════════════
const FUND_ORDER = ['nwa','raak-pro','raak-mkb','raak-publiek','kiem'];
const FUND_COLOR = {
  'nwa':         '#f5a623',
  'raak-pro':    '#e53935',
  'raak-mkb':    '#9c27b0',
  'raak-publiek':'#4caf50',
  'kiem':        '#00bcd4',
  'other':       '#78909c',
};
function fundKey(scheme) {
  if (!scheme) return 'other';
  const s = scheme.toLowerCase();
  for (const k of FUND_ORDER) if (s.includes(k)) return k;
  return 'other';
}
function fundColor(scheme) { return FUND_COLOR[fundKey(scheme)] || FUND_COLOR.other; }

// ═══════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════
let allProjects  = [];
let simulation   = null;
let activeKw     = new Set();
let activeFund   = new Set();
let searchQ      = '';
let showLabels   = true;
let showInst     = true;
let showOrphan   = false;

// ═══════════════════════════════════════════════════════════════
//  SVG / zoom setup
// ═══════════════════════════════════════════════════════════════
const svg = d3.select('#graph');
const zoomG = svg.append('g').attr('class','zoom-root');
const linkG = zoomG.append('g').attr('class','links');
const nodeG = zoomG.append('g').attr('class','nodes');
const labelG = zoomG.append('g').attr('class','labels');

const zoom = d3.zoom()
  .scaleExtent([0.1, 8])
  .on('zoom', e => zoomG.attr('transform', e.transform));
svg.call(zoom);

// double-click to reset
svg.on('dblclick.zoom', () => {
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
});

// ═══════════════════════════════════════════════════════════════
//  Tooltip
// ═══════════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
function showTip(evt, html) {
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  moveTip(evt);
}
function moveTip(evt) {
  const wrap = document.getElementById('graph-wrap');
  const r = wrap.getBoundingClientRect();
  let x = evt.clientX - r.left + 14;
  let y = evt.clientY - r.top  + 14;
  if (x + 310 > r.width)  x = evt.clientX - r.left - 320;
  if (y + 200 > r.height) y = evt.clientY - r.top  - 210;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTip() { tooltip.style.display = 'none'; }

// ═══════════════════════════════════════════════════════════════
//  Parse JSON (handles raw array or tuple format)
// ═══════════════════════════════════════════════════════════════
function parseProjects(raw) {
  if (!Array.isArray(raw)) throw new Error('Expected a JSON array');
  return raw.map(item => {
    // tuple format: [project, [matched_terms]]
    if (Array.isArray(item) && item.length === 2 && typeof item[0] === 'object' && !Array.isArray(item[0])) {
      const [proj, hits] = item;
      if (!proj._matched_terms && Array.isArray(hits)) proj._matched_terms = hits;
      return proj;
    }
    return item;
  });
}

// ═══════════════════════════════════════════════════════════════
//  Build sidebar filters after data loaded
// ═══════════════════════════════════════════════════════════════
function buildFilters(projects) {
  // ── Funding types ──
  const fundCount = {};
  projects.forEach(p => {
    const k = fundKey(p.funding_scheme);
    fundCount[k] = (fundCount[k] || 0) + 1;
  });
  const fundOrder = [...FUND_ORDER, 'other'].filter(k => fundCount[k]);
  activeFund = new Set(fundOrder);

  const fundDiv = document.getElementById('fund-checks');
  fundDiv.innerHTML = '';
  fundOrder.forEach(k => {
    const row = document.createElement('div');
    row.className = 'check-row';
    const id = 'f_' + k;
    row.innerHTML = `
      <input type="checkbox" id="${id}" checked data-fund="${k}">
      <label for="${id}" style="color:${FUND_COLOR[k]}">${k.toUpperCase()}</label>
      <span class="badge">${fundCount[k]}</span>`;
    row.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) activeFund.add(k); else activeFund.delete(k);
      render();
    });
    fundDiv.appendChild(row);
  });

  // ── Keywords ──
  const kwCount = {};
  projects.forEach(p => {
    (p._matched_terms || []).forEach(t => {
      const term = t.toLowerCase().trim();
      kwCount[term] = (kwCount[term] || 0) + 1;
    });
  });
  const kwSorted = Object.entries(kwCount).sort((a,b) => b[1]-a[1]).map(([t]) => t);
  activeKw = new Set(kwSorted);

  const kwDiv = document.getElementById('kw-checks');
  kwDiv.innerHTML = '';
  kwSorted.forEach(term => {
    const row = document.createElement('div');
    row.className = 'check-row';
    const id = 'k_' + term.replace(/\W/g,'_');
    row.innerHTML = `
      <input type="checkbox" id="${id}" checked data-kw="${term}">
      <label for="${id}">${term}</label>
      <span class="badge">${kwCount[term]}</span>`;
    row.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) activeKw.add(term); else activeKw.delete(term);
      render();
    });
    kwDiv.appendChild(row);
  });
}

// ── All-on buttons ──
document.getElementById('btn-all-fund').addEventListener('click', () => {
  document.querySelectorAll('[data-fund]').forEach(cb => { cb.checked = true; activeFund.add(cb.dataset.fund); });
  render();
});
document.getElementById('btn-all-kw').addEventListener('click', () => {
  document.querySelectorAll('[data-kw]').forEach(cb => { cb.checked = true; activeKw.add(cb.dataset.kw); });
  render();
});

// ── Display toggles ──
document.getElementById('show-labels').addEventListener('change', e => { showLabels = e.target.checked; render(); });
document.getElementById('show-inst').addEventListener('change', e => { showInst = e.target.checked; render(); });
document.getElementById('show-orphan').addEventListener('change', e => { showOrphan = e.target.checked; render(); });

// ── Search ──
document.getElementById('search').addEventListener('input', e => { searchQ = e.target.value.trim().toLowerCase(); render(); });

// ═══════════════════════════════════════════════════════════════
//  Filter projects
// ═══════════════════════════════════════════════════════════════
function filterProjects() {
  return allProjects.filter(p => {
    // funding filter
    if (!activeFund.has(fundKey(p.funding_scheme))) return false;

    // keyword filter: project must have at least one active keyword
    const terms = (p._matched_terms || []).map(t => t.toLowerCase().trim());
    // if no matched_terms at all, include always (scheme-only match)
    if (terms.length > 0 && !terms.some(t => activeKw.has(t))) return false;

    // search filter
    if (searchQ) {
      const hay = [
        p.title_en, p.title_nl, p.summary_en, p.summary_nl,
        p._pi_name, p._pi_institution, p.project_id, p.funding_scheme
      ].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(searchQ)) return false;
    }

    return true;
  });
}

// ═══════════════════════════════════════════════════════════════
//  Build graph data
// ═══════════════════════════════════════════════════════════════
function buildGraph(projects) {
  const nodes = [];
  const links = [];
  const instMap = new Map(); // name → node

  projects.forEach(p => {
    const pid   = p.project_id || p.id || Math.random().toString(36).slice(2);
    const title = p.title_en || p.title_nl || p.title || pid;
    const pNode = {
      id:     pid,
      type:   'project',
      label:  title.length > 45 ? title.slice(0,42)+'…' : title,
      fullTitle: title,
      scheme: p.funding_scheme || '',
      start:  (p.start_date||'').slice(0,4),
      end:    (p.end_date||'').slice(0,4),
      pi:     p._pi_name || '',
      piInst: p._pi_institution || '',
      terms:  p._matched_terms || [],
      url:    p.project_page_url || p.url || '',
      r:      6,
    };
    nodes.push(pNode);

    // extract institutions from project_members
    const members = p.project_members || [];
    const orgsForProject = new Set();

    members.forEach(m => {
      const orgStr = m.organisation || m.organization || '';
      const orgParts = orgStr.split('||').map(s => s.trim()).filter(Boolean);
      orgParts.forEach(org => {
        if (!org || org.length < 2) return;
        if (!orgsForProject.has(org)) {
          orgsForProject.add(org);
          if (!instMap.has(org)) {
            const iNode = {
              id:    'inst_' + org,
              type:  'institution',
              label: org.length > 35 ? org.slice(0,32)+'…' : org,
              fullLabel: org,
              r:     4,
              count: 0,
            };
            instMap.set(org, iNode);
            nodes.push(iNode);
          }
          instMap.get(org).count++;
          links.push({ source: pid, target: 'inst_' + org });
        }
      });
    });
  });

  // adjust institution radius by connectivity
  instMap.forEach(n => { n.r = Math.min(3 + n.count * 0.8, 10); });

  return { nodes, links };
}

// ═══════════════════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════════════════
function render() {
  const projects = filterProjects();
  const { nodes: rawNodes, links: rawLinks } = buildGraph(projects);

  // optionally hide institutions
  let nodes, links;
  if (!showInst) {
    nodes = rawNodes.filter(n => n.type === 'project');
    links = [];
  } else {
    // optionally hide orphan institutions (only 1 connection)
    const instConnected = new Set(rawLinks.map(l => l.target));
    const instDegree = {};
    rawLinks.forEach(l => { instDegree[l.target] = (instDegree[l.target]||0)+1; });

    nodes = rawNodes.filter(n => {
      if (n.type === 'project') return true;
      if (!showOrphan && instDegree['inst_' + n.fullLabel] <= 1 && instDegree[n.id] <= 1) {
        // check by id
        const deg = rawLinks.filter(l => l.target === n.id || l.source === n.id).length;
        return deg > 1;
      }
      return true;
    });
    const nodeIds = new Set(nodes.map(n => n.id));
    links = rawLinks.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
  }

  // stats
  const nProj = nodes.filter(n => n.type==='project').length;
  const nInst = nodes.filter(n => n.type==='institution').length;
  document.getElementById('stats').textContent =
    `${nProj} projects · ${nInst} institutions · ${links.length} links`;

  // hide/show no-data panel
  document.getElementById('no-data').style.display = allProjects.length === 0 ? 'block' : 'none';

  // stop old simulation
  if (simulation) simulation.stop();

  // clear
  linkG.selectAll('*').remove();
  nodeG.selectAll('*').remove();
  labelG.selectAll('*').remove();

  if (nodes.length === 0) return;

  // initialise positions around centre
  const W = svg.node().clientWidth  || 900;
  const H = svg.node().clientHeight || 600;
  nodes.forEach(n => {
    if (n.x === undefined) {
      n.x = W/2 + (Math.random()-0.5)*120;
      n.y = H/2 + (Math.random()-0.5)*120;
    }
  });

  // ── Links ──
  const link = linkG.selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', '#2a2a5a')
    .attr('stroke-width', 0.8)
    .attr('stroke-opacity', 0.6);

  // ── Nodes ──
  const node = nodeG.selectAll('circle')
    .data(nodes, d => d.id)
    .join('circle')
    .attr('r', d => d.r)
    .attr('fill', d => d.type === 'project' ? fundColor(d.scheme) : '#4a90d9')
    .attr('fill-opacity', d => d.type === 'project' ? 0.9 : 0.65)
    .attr('stroke', d => d.type === 'project' ? '#fff' : '#aaa')
    .attr('stroke-width', d => d.type === 'project' ? 0.8 : 0.4)
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag',  dragged)
      .on('end',   dragEnd))
    .on('mouseover', (evt, d) => {
      let html;
      if (d.type === 'project') {
        html = `<h3>${escHtml(d.fullTitle)}</h3>
          <div class="tt-meta">
            <b>Scheme:</b> ${escHtml(d.scheme)}<br>
            <b>Period:</b> ${d.start||'?'} – ${d.end||'?'}<br>
            ${d.pi ? `<b>PI:</b> ${escHtml(d.pi)}<br>` : ''}
            ${d.piInst ? `<b>Institution:</b> ${escHtml(d.piInst)}<br>` : ''}
          </div>
          ${d.terms.length ? `<div class="tt-terms">🏷 ${d.terms.join(' · ')}</div>` : ''}
          ${d.url ? `<div style="margin-top:5px"><a href="${escHtml(d.url)}" target="_blank">Project page ↗</a></div>` : ''}`;
      } else {
        html = `<h3 style="color:#4a90d9">${escHtml(d.fullLabel)}</h3>
          <div class="tt-meta">Research institution</div>`;
      }
      showTip(evt, html);
      // highlight connected
      link.attr('stroke-opacity', l =>
        (l.source.id===d.id||l.target.id===d.id) ? 1 : 0.1)
         .attr('stroke', l =>
        (l.source.id===d.id||l.target.id===d.id) ? '#f5a623' : '#2a2a5a');
      node.attr('fill-opacity', n =>
        n.id===d.id ? 1 :
        links.some(l=>(l.source.id===d.id&&l.target.id===n.id)||(l.target.id===d.id&&l.source.id===n.id)) ? 0.95 : 0.2);
    })
    .on('mousemove', moveTip)
    .on('mouseout', () => {
      hideTip();
      link.attr('stroke-opacity', 0.6).attr('stroke', '#2a2a5a');
      node.attr('fill-opacity', d => d.type==='project' ? 0.9 : 0.65);
    })
    .on('click', (evt, d) => {
      if (d.url) window.open(d.url, '_blank');
    });

  // ── Labels (projects only) ──
  const label = labelG.selectAll('text')
    .data(showLabels ? nodes.filter(n=>n.type==='project') : [], d => d.id)
    .join('text')
    .text(d => d.label)
    .attr('font-size', '7px')
    .attr('fill', '#ccccee')
    .attr('pointer-events', 'none')
    .attr('dy', d => -d.r - 2);

  // ── Simulation ──
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d =>
      d.source.type==='project' ? 45 : 38).strength(0.4))
    .force('charge', d3.forceManyBody().strength(d =>
      d.type==='project' ? -55 : -25))
    .force('collide', d3.forceCollide(d => d.type==='project' ? 9 : 5))
    .force('center', d3.forceCenter(W/2, H/2).strength(0.04))
    .alphaDecay(0.025)
    .on('tick', ticked);

  function ticked() {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node
      .attr('cx', d => d.x).attr('cy', d => d.y);
    label
      .attr('x', d => d.x).attr('y', d => d.y);
  }

  function dragStart(evt, d) {
    if (!evt.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(evt, d) { d.fx = evt.x; d.fy = evt.y; }
  function dragEnd(evt, d) {
    if (!evt.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }
}

// ═══════════════════════════════════════════════════════════════
//  Load data
// ═══════════════════════════════════════════════════════════════
function ingest(raw) {
  try {
    allProjects = parseProjects(raw);
    buildFilters(allProjects);
    render();
    document.getElementById('no-data').style.display = 'none';
  } catch(e) {
    showError('Parse error: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('load-error').textContent = msg;
  document.getElementById('no-data').style.display = 'block';
}

// ── File picker ──
document.getElementById('file-btn').addEventListener('click', () =>
  document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', evt => {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try { ingest(JSON.parse(e.target.result)); }
    catch(err) { showError('Cannot parse JSON: ' + err.message); }
  };
  reader.readAsText(file);
});

// ── Drag & drop onto graph area ──
const graphWrap = document.getElementById('graph-wrap');
graphWrap.addEventListener('dragover', e => e.preventDefault());
graphWrap.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { ingest(JSON.parse(ev.target.result)); }
    catch(err) { showError('Cannot parse dropped file: ' + err.message); }
  };
  reader.readAsText(file);
});

// ── Auto-load via fetch (works when served over HTTP/S) ──
(async function autoLoad() {
  const candidates = [
    'nwo_fashion_textile_filtered.json',
    './nwo_fashion_textile_filtered.json',
  ];
  for (const url of candidates) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const data = await resp.json();
      ingest(data);
      return;
    } catch (_) { /* try next */ }
  }
  // Not found over HTTP — show manual picker (already visible)
})();

// ═══════════════════════════════════════════════════════════════
//  Utilities
// ═══════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
