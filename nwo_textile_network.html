<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NWO — Fashion &amp; Textile Research Network</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, Arial, sans-serif;
  background: #0f1117;
  color: #d0d8e8;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────── */
#header {
  background: #161922;
  border-bottom: 1px solid #252836;
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  z-index: 10;
}
#app-title {
  font-size: 13px;
  font-weight: 700;
  color: #8898c0;
  white-space: nowrap;
  letter-spacing: .3px;
}
#search {
  flex: 1;
  max-width: 260px;
  background: #1e2130;
  border: 1px solid #303450;
  border-radius: 5px;
  padding: 5px 10px;
  color: #d0d8e8;
  font-size: 12px;
  outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: #4a6ad0; }
#search::placeholder { color: #4a5570; }
#status-pill {
  font-size: 11px;
  color: #5a6a8a;
  white-space: nowrap;
}
#load-btn {
  background: #263a70;
  border: 1px solid #3a50a0;
  color: #c0cce8;
  padding: 5px 11px;
  border-radius: 5px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .2s;
}
#load-btn:hover { background: #2e4888; }

/* ── Body layout ─────────────────────────────────────── */
#body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────── */
#sidebar {
  width: 200px;
  min-width: 200px;
  background: #12141e;
  border-right: 1px solid #1e2130;
  overflow-y: auto;
  padding: 10px 10px 20px;
  flex-shrink: 0;
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: #252836; border-radius: 2px; }

.sec-head {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: #404870;
  margin: 16px 0 5px;
  padding-bottom: 4px;
  border-bottom: 1px solid #1e2130;
}
.sec-head:first-of-type { margin-top: 4px; }

#server-notice {
  background: #14201a;
  border: 1px solid #1e3828;
  border-radius: 5px;
  padding: 7px 9px;
  margin-bottom: 8px;
  font-size: 10.5px;
  color: #4a8060;
  line-height: 1.55;
}
#server-notice code {
  background: #0c1810;
  padding: 1px 4px;
  border-radius: 3px;
  font-family: monospace;
  font-size: 10px;
}
#server-notice.hidden { display: none; }

/* filter rows */
.f-row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 2.5px 3px;
  cursor: pointer;
  border-radius: 4px;
  user-select: none;
}
.f-row:hover { background: #1a1d2a; }
.f-row input[type=checkbox] {
  accent-color: #4a6ad0;
  cursor: pointer;
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}
.f-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.f-label {
  font-size: 11.5px;
  color: #a0aac8;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.f-count {
  font-size: 10px;
  color: #404870;
  min-width: 20px;
  text-align: right;
}

/* display toggles */
.tog-row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 2.5px 3px;
  cursor: pointer;
  border-radius: 4px;
}
.tog-row:hover { background: #1a1d2a; }
.tog-row input { accent-color: #4a6ad0; cursor: pointer; }
.tog-label { font-size: 11.5px; color: #8090b0; }

/* ── Graph canvas ─────────────────────────────────────── */
#graph-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#graph { width: 100%; height: 100%; display: block; }

/* ── Tooltip ─────────────────────────────────────────── */
#tooltip {
  position: absolute;
  background: #1a1d2a;
  border: 1px solid #2e3248;
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 11.5px;
  line-height: 1.55;
  pointer-events: none;
  display: none;
  max-width: 280px;
  z-index: 50;
  box-shadow: 0 6px 20px rgba(0,0,0,.55);
}
.tt-title { font-weight: 700; color: #d0dcff; margin-bottom: 5px; font-size: 12px; }
.tt-row   { color: #607090; }
.tt-row b { color: #9aaac8; font-weight: 400; }
.tt-doi a { color: #5a90e0; text-decoration: none; }
.tt-doi a:hover { text-decoration: underline; }

/* ── Stats ───────────────────────────────────────────── */
#stats {
  position: absolute;
  bottom: 10px;
  right: 12px;
  font-size: 10px;
  color: #303858;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────── -->
<div id="header">
  <span id="app-title">NWO Fashion &amp; Textile</span>
  <input id="search" type="text" placeholder="🔍  Search project title…" autocomplete="off">
  <span id="status-pill"></span>
  <button id="load-btn">📂 Load JSON</button>
  <input id="file-input" type="file" accept=".json" style="display:none">
</div>

<!-- ── Body ────────────────────────────────────────── -->
<div id="body">

  <!-- Sidebar -->
  <div id="sidebar">

    <div id="server-notice">
      <b>Auto-load</b> — serve locally:<br>
      <code>python3 -m http.server 8080</code><br>
      then open <code>localhost:8080</code><br>
      or use <b>📂 Load JSON</b> above.
    </div>

    <div class="sec-head">Keywords</div>
    <div id="kw-list"></div>

    <div class="sec-head">Funding Type</div>
    <div id="ft-list"></div>

    <div class="sec-head">Display</div>
    <label class="tog-row">
      <input type="checkbox" id="tog-labels" checked>
      <span class="tog-label">Show labels</span>
    </label>
    <label class="tog-row">
      <input type="checkbox" id="tog-institutions" checked>
      <span class="tog-label">Show institutions</span>
    </label>
    <label class="tog-row">
      <input type="checkbox" id="tog-tooltip" checked>
      <span class="tog-label">Hover details</span>
    </label>

  </div><!-- /sidebar -->

  <!-- Graph -->
  <div id="graph-wrap">
    <svg id="graph"></svg>

    <div id="tooltip">
      <div class="tt-title" id="tt-title"></div>
      <div class="tt-row">Scheme:&nbsp;&nbsp;<b id="tt-scheme"></b></div>
      <div class="tt-row">Years:&nbsp;&nbsp;&nbsp;<b id="tt-years"></b></div>
      <div class="tt-row">PI:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b id="tt-pi"></b></div>
      <div class="tt-row">Inst:&nbsp;&nbsp;&nbsp;&nbsp;<b id="tt-inst"></b></div>
      <div class="tt-row">Tags:&nbsp;&nbsp;&nbsp;&nbsp;<b id="tt-kw"></b></div>
      <div class="tt-doi" id="tt-doi"></div>
    </div>

    <div id="stats"></div>
  </div>

</div><!-- /body -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"
        integrity="sha512-vc58zeoMuqZBOpTkMFRMCnpNkRbhIPFUllQemk4g7f/bD5KU0MN0CQFG2q0LBJXo9ZuOvAhQKbCjVWRLkWBg=="
        crossorigin="anonymous"></script>
<script>
'use strict';

// ── Funding type catalogue (largest → smallest) ──────────────────
const FT_ORDER = [
  'NWA', 'RAAK-Pro', 'RAAK-MKB', 'RAAK-Publiek', 'RAAK-Other',
  'KIEM', 'SIA-Other', 'NWO-VI', 'OTP-STW', 'Other'
];
const FT_COLOUR = {
  'NWA':         '#9b59b6',
  'RAAK-Pro':    '#1a6fa0',
  'RAAK-MKB':    '#2196f3',
  'RAAK-Publiek':'#00897b',
  'RAAK-Other':  '#26a69a',
  'KIEM':        '#e67e22',
  'SIA-Other':   '#43a047',
  'NWO-VI':      '#e53935',
  'OTP-STW':     '#607d8b',
  'Other':       '#455a64',
};

function fundingType(scheme) {
  const s = (scheme || '').toLowerCase();
  if (s.includes('nwa'))                                    return 'NWA';
  if (s.includes('raak-pro')  || s.includes('raak pro'))   return 'RAAK-Pro';
  if (s.includes('raak-mkb')  || s.includes('raak mkb'))   return 'RAAK-MKB';
  if (s.includes('raak-pub')  || s.includes('raak pub'))   return 'RAAK-Publiek';
  if (s.includes('kiem'))                                   return 'KIEM';
  if (s.includes('raak'))                                   return 'RAAK-Other';
  if (s.includes('sia'))                                    return 'SIA-Other';
  if (s.includes('vidi') || s.includes('veni') || s.includes('vici')) return 'NWO-VI';
  if (s.includes('otp')  || s.includes('stw'))              return 'OTP-STW';
  return 'Other';
}

// ── State ─────────────────────────────────────────────────────────
let allProjects    = [];
let activeKW       = new Set();
let activeFT       = new Set();
let searchText     = '';
let showLabels     = true;
let showInst       = true;

// ── Parse one raw project record ──────────────────────────────────
function parseOne(raw) {
  // Handle [project, hits] tuple format from earlier script version
  if (Array.isArray(raw) && raw.length === 2 && Array.isArray(raw[1])) raw = raw[0];

  const id    = String(raw.project_id || raw.projectId || raw.id || Math.random());
  const title = (raw.title || 'Untitled').trim();
  const scheme = raw.funding_scheme || raw.fundingScheme || '';
  const ft    = fundingType(scheme);
  const sy    = (raw.start_date || raw.startDate || '').slice(0, 4);
  const ey    = (raw.end_date   || raw.endDate   || '').slice(0, 4);
  const kws   = raw._matched_terms || [];
  const piN   = (raw._pi_name         || '').trim();
  const piI   = (raw._pi_institution  || '').trim();
  const doi   = (raw.doi || raw.DOI   || '').trim();
  const url   = `https://www.nwo.nl/projecten/${id}`;

  // Collect all partner institutions from project_members
  const insts = new Set();
  if (piI) insts.add(piI);
  for (const m of (raw.project_members || raw.projectMembers || [])) {
    const org = ((m.organisation || m.organization || '').split('||')[0]).trim();
    if (org) insts.add(org);
  }

  return { id, title, scheme, ft, sy, ey, kws, piN, piI, doi, url,
           insts: [...insts], type: 'project' };
}

// ── Build graph nodes + links from filtered project list ──────────
function buildGraph(projects) {
  const nodes = [];
  const links = [];
  const instMap = new Map();

  for (const p of projects) {
    nodes.push(Object.assign({ x: undefined, y: undefined, vx: 0, vy: 0 }, p));

    if (!showInst) continue;
    for (const inst of p.insts) {
      const iid = 'i_' + inst.toLowerCase().replace(/[^a-z0-9]/g, '_').slice(0, 45);
      if (!instMap.has(iid)) {
        instMap.set(iid, { id: iid, label: inst, type: 'inst', n: 0,
                           x: undefined, y: undefined, vx: 0, vy: 0 });
      }
      instMap.get(iid).n++;
      links.push({ source: p.id, target: iid });
    }
  }
  for (const v of instMap.values()) nodes.push(v);
  return { nodes, links };
}

// ── Active filter ─────────────────────────────────────────────────
function filtered() {
  return allProjects.filter(p => {
    if (activeKW.size && !p.kws.some(k => activeKW.has(k))) return false;
    if (activeFT.size && !activeFT.has(p.ft))                return false;
    if (searchText && !p.title.toLowerCase().includes(searchText)) return false;
    return true;
  });
}

// ── D3 wiring ─────────────────────────────────────────────────────
let svg, root, sim;
let linkSel, nodeSel, labelSel;

function initSVG() {
  const wrap = document.getElementById('graph-wrap');
  svg = d3.select('#graph')
    .attr('width',  wrap.clientWidth)
    .attr('height', wrap.clientHeight);

  const zoom = d3.zoom().scaleExtent([0.05, 6])
    .on('zoom', e => root.attr('transform', e.transform));
  svg.call(zoom);

  root = svg.append('g');
  root.append('g').attr('class', 'lyr-links');
  root.append('g').attr('class', 'lyr-nodes');
  root.append('g').attr('class', 'lyr-labels');
}

function render() {
  const projs = filtered();
  const { nodes, links } = buildGraph(projs);

  const nProj = nodes.filter(n => n.type === 'project').length;
  const nInst = nodes.filter(n => n.type === 'inst').length;
  document.getElementById('stats').textContent =
    `${nProj} projects · ${nInst} institutions · ${links.length} links`;

  const W = +svg.attr('width'), H = +svg.attr('height');
  if (sim) sim.stop();

  sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d => d.id)
                        .distance(d => d.source.type === 'inst' || d.target.type === 'inst' ? 55 : 40)
                        .strength(0.9))
    .force('charge',  d3.forceManyBody()
                        .strength(d => d.type === 'inst' ? -140 : -55))
    .force('center',  d3.forceCenter(W / 2, H / 2).strength(0.04))
    .force('collide', d3.forceCollide().radius(d => d.type === 'inst' ? 15 : 8).strength(0.7))
    .force('x',       d3.forceX(W / 2).strength(0.03))
    .force('y',       d3.forceY(H / 2).strength(0.03))
    .alphaDecay(0.025);

  // ── Links ──
  linkSel = root.select('.lyr-links')
    .selectAll('line')
    .data(links, d => (d.source.id||d.source)+'-'+(d.target.id||d.target))
    .join(
      enter  => enter.append('line').attr('stroke', '#1e2438').attr('stroke-width', 1),
      update => update,
      exit   => exit.remove()
    );

  // ── Nodes ──
  nodeSel = root.select('.lyr-nodes')
    .selectAll('circle')
    .data(nodes, d => d.id)
    .join(
      enter => enter.append('circle')
        .attr('r', d => d.type === 'inst' ? 9 : 5.5)
        .attr('stroke', '#0f1117').attr('stroke-width', 1.2)
        .style('cursor', 'pointer')
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
          .on('drag',  (e, d) => { d.fx=e.x; d.fy=e.y; })
          .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
        .on('mouseover', showTip)
        .on('mousemove', moveTip)
        .on('mouseout',  hideTip),
      update => update,
      exit   => exit.remove()
    )
    .attr('fill', d => d.type === 'inst' ? '#0d6e5d' : (FT_COLOUR[d.ft] || '#455a64'));

  // ── Labels ──
  labelSel = root.select('.lyr-labels')
    .selectAll('text')
    .data(nodes, d => d.id)
    .join(
      enter => enter.append('text')
        .attr('text-anchor', 'middle')
        .attr('pointer-events', 'none'),
      update => update,
      exit   => exit.remove()
    )
    .attr('font-size', d => d.type === 'inst' ? 9.5 : 8.5)
    .attr('fill',      d => d.type === 'inst' ? '#5dc8b0' : '#8898c0')
    .attr('dy',        d => d.type === 'inst' ? -13 : -9)
    .text(d => {
      const s = d.type === 'inst' ? d.label : d.title;
      return s.length > 30 ? s.slice(0, 28) + '…' : s;
    })
    .style('display', showLabels ? null : 'none');

  sim.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel .attr('cx', d => d.x).attr('cy', d => d.y);
    labelSel.attr('x',  d => d.x).attr('y',  d => d.y);
  });
}

// ── Tooltip ───────────────────────────────────────────────────────
const $tt = document.getElementById('tooltip');

function showTip(event, d) {
  if (!document.getElementById('tog-tooltip').checked) return;
  if (d.type === 'inst') {
    document.getElementById('tt-title').textContent  = d.label;
    document.getElementById('tt-scheme').textContent = '';
    document.getElementById('tt-years').textContent  = `${d.n} project(s)`;
    document.getElementById('tt-pi').textContent     = '';
    document.getElementById('tt-inst').textContent   = '';
    document.getElementById('tt-kw').textContent     = '';
    document.getElementById('tt-doi').innerHTML      = '';
  } else {
    document.getElementById('tt-title').textContent  = d.title;
    document.getElementById('tt-scheme').textContent = d.scheme;
    document.getElementById('tt-years').textContent  = d.sy && d.ey ? `${d.sy} – ${d.ey}` : d.sy || '—';
    document.getElementById('tt-pi').textContent     = d.piN || '—';
    document.getElementById('tt-inst').textContent   = d.piI || '—';
    document.getElementById('tt-kw').textContent     = d.kws.join(', ') || '—';
    const doiEl = document.getElementById('tt-doi');
    if (d.doi) {
      const href = d.doi.startsWith('http') ? d.doi : `https://doi.org/${d.doi}`;
      doiEl.innerHTML = `DOI: <a href="${href}" target="_blank">${d.doi.replace('https://doi.org/','')}</a>`;
    } else {
      doiEl.innerHTML = `<a href="${d.url}" target="_blank">NWO project page ↗</a>`;
    }
  }
  $tt.style.display = 'block';
}

function moveTip(event) {
  const r = document.getElementById('graph-wrap').getBoundingClientRect();
  let x = event.clientX - r.left + 14, y = event.clientY - r.top - 10;
  if (x + 295 > r.width)  x -= 310;
  if (y + 180 > r.height) y -= 190;
  $tt.style.left = x + 'px';
  $tt.style.top  = y + 'px';
}
function hideTip() { $tt.style.display = 'none'; }

// ── Build sidebar ─────────────────────────────────────────────────
function buildSidebar() {
  // keyword counts from all loaded projects
  const kwC = {}, ftC = {};
  for (const p of allProjects) {
    for (const k of p.kws)  kwC[k]   = (kwC[k]   || 0) + 1;
    ftC[p.ft] = (ftC[p.ft] || 0) + 1;
  }

  // Keywords — sorted by count descending
  activeKW.clear();
  const kwDiv = document.getElementById('kw-list');
  kwDiv.innerHTML = '';
  Object.entries(kwC).sort((a, b) => b[1] - a[1]).forEach(([kw, cnt]) => {
    activeKW.add(kw);
    kwDiv.appendChild(makeRow(kw, kw, cnt, '#4a6ad0', () => {
      activeKW.has(kw) ? activeKW.delete(kw) : activeKW.add(kw);
      render();
    }, true));
  });

  // Funding types — in canonical order
  activeFT.clear();
  const ftDiv = document.getElementById('ft-list');
  ftDiv.innerHTML = '';
  for (const ft of FT_ORDER) {
    if (!ftC[ft]) continue;
    activeFT.add(ft);
    ftDiv.appendChild(makeRow(ft, ft, ftC[ft], FT_COLOUR[ft] || '#455a64', () => {
      activeFT.has(ft) ? activeFT.delete(ft) : activeFT.add(ft);
      render();
    }, true));
  }
}

function makeRow(id, label, count, colour, onChange, checked) {
  const el = document.createElement('label');
  el.className = 'f-row';

  const cb  = document.createElement('input');
  cb.type = 'checkbox'; cb.checked = checked;
  cb.addEventListener('change', onChange);

  const dot = document.createElement('span');
  dot.className = 'f-dot';
  dot.style.background = colour;

  const lbl = document.createElement('span');
  lbl.className = 'f-label'; lbl.textContent = label;

  const cnt = document.createElement('span');
  cnt.className = 'f-count'; cnt.textContent = count;

  el.append(cb, dot, lbl, cnt);
  return el;
}

// ── Data loading ──────────────────────────────────────────────────
function ingest(rawArray) {
  // Unwrap tuple format: [[project, hits], ...]
  if (rawArray.length && Array.isArray(rawArray[0]) && Array.isArray(rawArray[0][1])) {
    rawArray = rawArray.map(x => x[0]);
  }
  allProjects = rawArray.map(parseOne).filter(p => p.id);
  buildSidebar();
  render();
  document.getElementById('status-pill').textContent = `${allProjects.length} projects`;
  document.getElementById('server-notice').classList.add('hidden');
}

// Auto-fetch when served via HTTP
async function autoLoad() {
  const candidates = [
    'nwo_fashion_textile_filtered.json',
    'nwo_textile_raw.json',
  ];
  for (const fname of candidates) {
    try {
      const r = await fetch(fname);
      if (!r.ok) continue;
      const data = await r.json();
      if (Array.isArray(data) && data.length) {
        document.getElementById('status-pill').textContent = `Auto-loaded: ${fname}`;
        ingest(data);
        return;
      }
    } catch (_) { /* fetch blocked on file:// — normal */ }
  }
}

// Manual load
document.getElementById('load-btn').addEventListener('click', () =>
  document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try { ingest(JSON.parse(ev.target.result)); }
    catch(err) { alert('JSON parse error: ' + err.message); }
  };
  r.readAsText(f);
  e.target.value = '';
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchText = e.target.value.toLowerCase().trim();
  render();
});

// Display toggles
document.getElementById('tog-labels').addEventListener('change', e => {
  showLabels = e.target.checked;
  if (labelSel) labelSel.style('display', showLabels ? null : 'none');
});
document.getElementById('tog-institutions').addEventListener('change', e => {
  showInst = e.target.checked;
  render();
});

// Resize
const resizeObs = new ResizeObserver(() => {
  const w = document.getElementById('graph-wrap');
  svg.attr('width', w.clientWidth).attr('height', w.clientHeight);
});
resizeObs.observe(document.getElementById('graph-wrap'));

// Boot
initSVG();
autoLoad();
</script>
</body>
</html>
