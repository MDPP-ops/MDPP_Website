<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWO Textile &amp; Fashion — Full Raw Network</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg:          #1a1a2e;
    --panel:       #16213e;
    --panel2:      #0f3460;
    --border:      #2a2a5a;
    --text:        #e0e0f0;
    --text-dim:    #8888aa;
    --accent:      #f5a623;
    --accent2:     #4a90d9;
    --green:       #4caf50;
    --red:         #e53935;
    --purple:      #9c27b0;
    --teal:        #00bcd4;
    --node-proj:   #f5a623;
    --node-inst:   #4a90d9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  header .subtitle { font-size: 11px; color: var(--text-dim); }
  #stats { margin-left: auto; font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  /* ── Layout ── */
  .main-layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  aside {
    width: 230px;
    min-width: 230px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-scroll { overflow-y: auto; flex: 1; padding: 8px; }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-track { background: var(--panel); }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Search */
  .search-wrap {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 5px 8px;
    font-size: 12px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }

  /* Section headers */
  .section-hd {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 4px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }
  .section-hd button {
    font-size: 9px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 3px;
    padding: 1px 5px;
    cursor: pointer;
    white-space: nowrap;
  }
  .section-hd button:hover { color: var(--text); border-color: var(--text-dim); }

  /* Add-keyword input row */
  .kw-add-row {
    display: flex;
    gap: 4px;
    padding: 2px 4px 6px;
  }
  #kw-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 3px 6px;
    font-size: 11px;
    outline: none;
  }
  #kw-input:focus { border-color: var(--accent); }
  #kw-input::placeholder { color: var(--text-dim); }
  #kw-add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
  #kw-add-btn:hover { opacity: 0.85; }

  /* Remove button on keyword rows */
  .kw-remove {
    font-size: 10px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .kw-remove:hover { color: var(--red); }

  /* Checkboxes */
  .check-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 4px;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
  }
  .check-row:hover { background: var(--panel2); }
  .check-row input[type=checkbox] { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .check-row label {
    flex: 1;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .check-row .badge {
    font-size: 9px;
    background: var(--panel2);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 0 5px;
    flex-shrink: 0;
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }

  .toggle-row { display: flex; align-items: center; gap: 6px; padding: 3px 4px; }
  .toggle-row label { font-size: 11px; color: var(--text-dim); }

  .legend-item { display: flex; align-items: center; gap: 6px; padding: 2px 4px; font-size: 11px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── Graph ── */
  #graph-wrap { flex: 1; position: relative; overflow: hidden; }
  svg#graph { width: 100%; height: 100%; background: var(--bg); }

  /* ── Project list panel ── */
  #proj-panel {
    width: 260px;
    min-width: 260px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #proj-panel-hd {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #proj-panel-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex: 1;
  }
  #proj-dl-btn {
    font-size: 10px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 3px;
    padding: 3px 8px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #proj-dl-btn:hover { opacity: 0.85; }
  #proj-list { overflow-y: auto; flex: 1; padding: 4px; }
  #proj-list::-webkit-scrollbar { width: 4px; }
  #proj-list::-webkit-scrollbar-track { background: var(--panel); }
  #proj-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .proj-item {
    padding: 5px 6px;
    border-radius: 3px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .proj-item:hover { background: var(--panel2); }
  .proj-item .proj-title { font-size: 10px; color: var(--text); line-height: 1.3; }
  .proj-item .proj-meta  { font-size: 9px;  color: var(--text-dim); margin-top: 2px; }
  .proj-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 3px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  /* ── Loading ── */
  #loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg); z-index: 200;
  }
  #loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 12px; color: var(--text-dim); }

  /* ── Tooltip ── */
  #tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    max-width: 300px;
    pointer-events: none;
    display: none;
    z-index: 100;
    line-height: 1.5;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #tooltip h3 { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
  #tooltip .tt-meta { font-size: 11px; color: var(--text-dim); }
  #tooltip .tt-terms { font-size: 10px; color: var(--teal); margin-top: 4px; }
  #tooltip a { color: var(--accent2); font-size: 11px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>NWO · Textile &amp; Fashion Research Network — Full Raw Dataset</h1>
    <div class="subtitle">Force-directed graph · projects ↔ institutions · keyword filter optional</div>
  </div>
  <div id="stats">Loading…</div>
</header>

<div class="main-layout">
  <aside>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search title / PI / institution…">
    </div>
    <div class="sidebar-scroll">

      <!-- Keywords -->
      <div class="section-hd">
        Keywords
        <button id="btn-kw-all">all</button>
        <button id="btn-kw-clear">none</button>
      </div>
      <div id="kw-checks"></div>
      <!-- Add keyword -->
      <div class="kw-add-row">
        <input type="text" id="kw-input" placeholder="add keyword…">
        <button id="kw-add-btn">+</button>
      </div>

      <hr class="divider">

      <!-- Funding types -->
      <div class="section-hd">
        Funding type
        <button id="btn-all-fund">all</button>
      </div>
      <div id="fund-checks"></div>

      <hr class="divider">

      <!-- Display toggles -->
      <div class="section-hd">Display</div>
      <div class="toggle-row">
        <input type="checkbox" id="show-labels">
        <label for="show-labels">Project labels</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="show-inst" checked>
        <label for="show-inst">Institutions</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="show-orphan">
        <label for="show-orphan">Orphan institutions</label>
      </div>

      <hr class="divider">

      <!-- Legend -->
      <div class="section-hd">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f5a623"></div> NWA</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e53935"></div> RAAK-Pro</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9c27b0"></div> RAAK-MKB</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div> RAAK-Publiek</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00bcd4"></div> KIEM</div>
      <div class="legend-item"><div class="legend-dot" style="background:#78909c"></div> Other</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4a90d9; border:1px solid #aaa"></div> Institution</div>
    </div>
  </aside>

  <div id="graph-wrap">
    <svg id="graph"></svg>
    <div id="loading">
      <div class="spinner"></div>
      <p id="loading-msg">Loading nwo_textile_raw.json…</p>
    </div>
    <div id="tooltip"></div>
  </div>

  <!-- ── Project list ── -->
  <div id="proj-panel">
    <div id="proj-panel-hd">
      <span id="proj-panel-title">Projects in view</span>
      <button id="proj-dl-btn">⬇ CSV</button>
    </div>
    <div id="proj-list"></div>
  </div>
</div>

<script>
if (typeof d3 === 'undefined') {
  document.getElementById('loading').innerHTML =
    '<p style="color:#e53935">D3.js failed to load. Check your connection and reload.</p>';
  throw new Error('D3 not available');
}

// ═══════════════════════════════════════════════════════════════
//  Default keyword list — textile/fashion domain (NL + EN)
//  Excludes: leer (learn), stof (substance), mode (method),
//            print (too broad) — Dutch false-positives
// ═══════════════════════════════════════════════════════════════
const DEFAULT_KEYWORDS = [
  'textile','textiel','fashion','garment',
  'wool','wol','cotton','katoen',
  'fiber','fibre','vezel',
  'weven','kleding',
  'zijde','polyester','denim','leather',
  'fabric','dye',
  'recycled textile','circular textile','circular fashion',
  'circulair textiel','textiel recycling',
  'smart textile',
  'duurzame mode',
  'lifecycle','value chain',
  'hergebruik','biobased','wearable',
  'supply chain','waardeketen','levenscyclus',
  'biomaterial','coating','hemp','hennep',
];

// ═══════════════════════════════════════════════════════════════
//  Funding helpers
// ═══════════════════════════════════════════════════════════════
const FUND_ORDER = ['nwa','raak-pro','raak-mkb','raak-publiek','kiem'];
const FUND_COLOR = {
  'nwa':          '#f5a623',
  'raak-pro':     '#e53935',
  'raak-mkb':     '#9c27b0',
  'raak-publiek': '#4caf50',
  'kiem':         '#00bcd4',
  'other':        '#78909c',
};
function fundKey(scheme) {
  if (!scheme) return 'other';
  const s = scheme.toLowerCase();
  if (s.includes('nwa'))                        return 'nwa';
  if (s.includes('raak') && s.includes('pro'))  return 'raak-pro';
  if (s.includes('raak') && s.includes('mkb'))  return 'raak-mkb';
  if (s.includes('raak') && s.includes('publ')) return 'raak-publiek';
  if (s.includes('kiem'))                       return 'kiem';
  return 'other';
}
function fundColor(s) { return FUND_COLOR[fundKey(s)] || FUND_COLOR.other; }

// ═══════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════
let allProjects  = [];      // all 4090 annotated
let keywords     = [...DEFAULT_KEYWORDS];  // current keyword list
// textile/textiel/garment/fashion on by default; empty = show all
let activeKw     = new Set(['textile','textiel','garment','fashion']);
let activeFund   = new Set();
let searchQ      = '';
let showLabels   = false;
let showInst     = true;
let showOrphan   = false;
let simulation   = null;

// ═══════════════════════════════════════════════════════════════
//  SVG / zoom
// ═══════════════════════════════════════════════════════════════
const svg    = d3.select('#graph');
const zoomG  = svg.append('g');
const linkG  = zoomG.append('g');
const nodeG  = zoomG.append('g');
const labelG = zoomG.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.02, 10])
  .on('zoom', e => zoomG.attr('transform', e.transform));
svg.call(zoom);
svg.on('dblclick.zoom', () =>
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity));

// ═══════════════════════════════════════════════════════════════
//  Tooltip
// ═══════════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
function showTip(evt, html) {
  tooltip.innerHTML = html; tooltip.style.display = 'block'; moveTip(evt);
}
function moveTip(evt) {
  const r = document.getElementById('graph-wrap').getBoundingClientRect();
  let x = evt.clientX - r.left + 14, y = evt.clientY - r.top + 14;
  if (x + 310 > r.width)  x = evt.clientX - r.left - 320;
  if (y + 200 > r.height) y = evt.clientY - r.top  - 210;
  tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
}
function hideTip() { tooltip.style.display = 'none'; }

// ═══════════════════════════════════════════════════════════════
//  Annotate raw projects
// ═══════════════════════════════════════════════════════════════
function annotate(raw) {
  return raw.map(p => {
    const hay = [p.title, p.summary_nl, p.summary_en]
      .filter(Boolean).join(' ').toLowerCase();
    const members = p.project_members || [];
    const pi = members.find(m => /main applicant/i.test(m.role || ''))
            || members.find(m => /project leader/i.test(m.role || ''))
            || members[0] || null;
    return {
      ...p,
      title_en:        p.title || '',
      _hay:            hay,
      _matched_terms:  [],   // computed per render by matchTerms()
      _pi_name:        pi ? `${pi.first_name||''} ${pi.last_name||''}`.trim() : '',
      _pi_institution: pi ? (pi.organisation||'').split('||')[0].trim() : '',
      project_page_url: `https://www.nwo.nl/projecten/${p.project_id}`,
    };
  });
}

// Re-compute matched terms against current keyword list
function matchTerms(p) {
  return keywords.filter(k => p._hay.includes(k.toLowerCase()));
}

// ═══════════════════════════════════════════════════════════════
//  Keyword checkbox UI  (with per-keyword counts)
// ═══════════════════════════════════════════════════════════════
function kwCount(kw) {
  // count against the full annotated dataset
  return allProjects.filter(p => p._hay.includes(kw.toLowerCase())).length;
}

function buildKwChecks() {
  const div = document.getElementById('kw-checks');
  div.innerHTML = '';
  // Sort by hit count descending, stable (preserves insertion order on ties)
  const sorted = [...keywords].sort((a, b) => kwCount(b) - kwCount(a));
  sorted.forEach(kw => {
    const count = kwCount(kw);
    const id    = 'kw_' + kw.replace(/\W/g, '_');
    const row   = document.createElement('div');
    row.className = 'check-row';
    row.innerHTML = `
      <input type="checkbox" id="${id}" data-kw="${kw}"${activeKw.has(kw) ? ' checked' : ''}>
      <label for="${id}">${kw}</label>
      <span class="badge">${count}</span>`;
    // remove button
    const rm = document.createElement('button');
    rm.className = 'kw-remove';
    rm.title = 'Remove keyword';
    rm.textContent = '×';
    rm.addEventListener('click', () => {
      keywords = keywords.filter(k => k !== kw);
      activeKw.delete(kw);
      buildKwChecks();
      render();
    });
    row.appendChild(rm);
    row.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) activeKw.add(kw); else activeKw.delete(kw);
      render();
    });
    div.appendChild(row);
  });
}

// "all" checks every keyword
document.getElementById('btn-kw-all').addEventListener('click', () => {
  keywords.forEach(k => activeKw.add(k));
  buildKwChecks();
  render();
});

// "none" unchecks all → show every project
document.getElementById('btn-kw-clear').addEventListener('click', () => {
  activeKw.clear();
  buildKwChecks();
  render();
});

// Add-keyword input
document.getElementById('kw-add-btn').addEventListener('click', addKeyword);
document.getElementById('kw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addKeyword();
});
function addKeyword() {
  const val = document.getElementById('kw-input').value.trim().toLowerCase();
  if (!val || keywords.includes(val)) {
    document.getElementById('kw-input').value = '';
    return;
  }
  keywords.push(val);
  activeKw.add(val);   // auto-activate new keyword
  document.getElementById('kw-input').value = '';
  buildKwChecks();
  render();
}

// ═══════════════════════════════════════════════════════════════
//  Funding filter
// ═══════════════════════════════════════════════════════════════
function buildFundFilters() {
  const fundCount = {};
  allProjects.forEach(p => {
    const k = fundKey(p.funding_scheme);
    fundCount[k] = (fundCount[k] || 0) + 1;
  });
  const order = [...FUND_ORDER, 'other'].filter(k => fundCount[k]);
  activeFund = new Set(order);
  const div = document.getElementById('fund-checks');
  div.innerHTML = '';
  order.forEach(k => {
    const row = document.createElement('div');
    row.className = 'check-row';
    const id = 'f_' + k;
    row.innerHTML = `
      <input type="checkbox" id="${id}" checked data-fund="${k}">
      <label for="${id}" style="color:${FUND_COLOR[k]}">${k.toUpperCase()}</label>
      <span class="badge">${fundCount[k]}</span>`;
    row.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) activeFund.add(k); else activeFund.delete(k);
      render();
    });
    div.appendChild(row);
  });
}

document.getElementById('btn-all-fund').addEventListener('click', () => {
  document.querySelectorAll('[data-fund]').forEach(cb => {
    cb.checked = true; activeFund.add(cb.dataset.fund);
  });
  render();
});

// Display toggles
document.getElementById('show-labels').addEventListener('change', e => { showLabels = e.target.checked; render(); });
document.getElementById('show-inst').addEventListener('change',   e => { showInst   = e.target.checked; render(); });
document.getElementById('show-orphan').addEventListener('change', e => { showOrphan = e.target.checked; render(); });

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim().toLowerCase(); render();
});

// ═══════════════════════════════════════════════════════════════
//  Filter
// ═══════════════════════════════════════════════════════════════
function filterProjects() {
  return allProjects.filter(p => {
    // keyword filter: if any keywords active, project must match at least one
    if (activeKw.size > 0) {
      const terms = matchTerms(p);
      if (!terms.some(t => activeKw.has(t))) return false;
    }
    // funding
    if (!activeFund.has(fundKey(p.funding_scheme))) return false;
    // free-text
    if (searchQ) {
      const hay = [p.title_en, p.summary_en, p.summary_nl,
                   p._pi_name, p._pi_institution, p.project_id,
                   p.funding_scheme].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(searchQ)) return false;
    }
    return true;
  });
}

// ═══════════════════════════════════════════════════════════════
//  Build graph
// ═══════════════════════════════════════════════════════════════
function buildGraph(projects) {
  const nodes = [], links = [], instMap = new Map();
  projects.forEach(p => {
    const pid   = String(p.project_id || Math.random().toString(36).slice(2));
    const title = p.title_en || pid;
    nodes.push({
      id: pid, type: 'project',
      label:     title.length > 45 ? title.slice(0,42)+'…' : title,
      fullTitle: title,
      scheme:    p.funding_scheme || '',
      start:     (p.start_date || '').slice(0,4),
      end:       (p.end_date   || '').slice(0,4),
      pi:        p._pi_name || '',
      piInst:    p._pi_institution || '',
      terms:     matchTerms(p),
      url:       p.project_page_url || '',
      r: 5,
    });
    (p.project_members || []).forEach(m => {
      const orgStr = m.organisation || m.organization || '';
      orgStr.split('||').map(s => s.trim()).filter(s => s.length > 2).forEach(org => {
        if (!instMap.has(org)) {
          instMap.set(org, {
            id: 'inst_' + org, type: 'institution',
            label:     org.length > 35 ? org.slice(0,32)+'…' : org,
            fullLabel: org, r: 3, count: 0,
          });
          nodes.push(instMap.get(org));
        }
        instMap.get(org).count++;
        links.push({ source: pid, target: 'inst_' + org });
      });
    });
  });
  instMap.forEach(n => { n.r = Math.min(2 + n.count * 0.5, 9); });
  return { nodes, links };
}

// ═══════════════════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════════════════
function render() {
  const projects = filterProjects();
  let { nodes: rawNodes, links: rawLinks } = buildGraph(projects);

  let nodes, links;
  if (!showInst) {
    nodes = rawNodes.filter(n => n.type === 'project');
    links = [];
  } else {
    nodes = rawNodes.filter(n => {
      if (n.type === 'project') return true;
      const deg = rawLinks.filter(l => l.target === n.id || l.source === n.id).length;
      return showOrphan || deg > 1;
    });
    const nodeIds = new Set(nodes.map(n => n.id));
    links = rawLinks.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
  }

  const nP = nodes.filter(n => n.type==='project').length;
  const nI = nodes.filter(n => n.type==='institution').length;
  const kwLabel = activeKw.size > 0
    ? ` · filtered by ${activeKw.size} keyword${activeKw.size>1?'s':''}`
    : ' · all projects';
  document.getElementById('stats').textContent =
    `${nP} projects · ${nI} institutions · ${links.length} links${kwLabel}`;

  updateProjectList(projects);

  if (simulation) simulation.stop();
  linkG.selectAll('*').remove();
  nodeG.selectAll('*').remove();
  labelG.selectAll('*').remove();
  if (nodes.length === 0) return;

  const W = svg.node().clientWidth  || 900;
  const H = svg.node().clientHeight || 600;
  nodes.forEach(n => {
    if (n.x === undefined) {
      n.x = W/2 + (Math.random()-0.5)*200;
      n.y = H/2 + (Math.random()-0.5)*200;
    }
  });

  const link = linkG.selectAll('line').data(links).join('line')
    .attr('stroke', '#2a2a5a')
    .attr('stroke-width', 0.6)
    .attr('stroke-opacity', 0.5);

  const node = nodeG.selectAll('circle').data(nodes, d => d.id).join('circle')
    .attr('r', d => d.r)
    .attr('fill', d => d.type==='project' ? fundColor(d.scheme) : '#4a90d9')
    .attr('fill-opacity', d => d.type==='project' ? 0.85 : 0.6)
    .attr('stroke', d => d.type==='project' ? '#fff' : '#aaa')
    .attr('stroke-width', d => d.type==='project' ? 0.7 : 0.3)
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (evt,d) => { if(!evt.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (evt,d) => { d.fx=evt.x; d.fy=evt.y; })
      .on('end',   (evt,d) => { if(!evt.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('mouseover', (evt, d) => {
      let html;
      if (d.type === 'project') {
        html = `<h3>${escHtml(d.fullTitle)}</h3>
          <div class="tt-meta">
            <b>Scheme:</b> ${escHtml(d.scheme)}<br>
            <b>Period:</b> ${d.start||'?'} – ${d.end||'?'}<br>
            ${d.pi    ? `<b>PI:</b> ${escHtml(d.pi)}<br>` : ''}
            ${d.piInst? `<b>Institution:</b> ${escHtml(d.piInst)}<br>` : ''}
          </div>
          ${d.terms.length ? `<div class="tt-terms">🏷 ${d.terms.join(' · ')}</div>` : ''}
          ${d.url ? `<div style="margin-top:5px"><a href="${escHtml(d.url)}" target="_blank">NWO project page ↗</a></div>` : ''}`;
      } else {
        html = `<h3 style="color:#4a90d9">${escHtml(d.fullLabel)}</h3>
          <div class="tt-meta">Research institution · ${d.count} project(s)</div>`;
      }
      showTip(evt, html);
      link.attr('stroke-opacity', l =>
          (l.source.id===d.id||l.target.id===d.id) ? 1 : 0.06)
        .attr('stroke', l =>
          (l.source.id===d.id||l.target.id===d.id) ? '#f5a623' : '#2a2a5a');
      node.attr('fill-opacity', n =>
        n.id===d.id ? 1 :
        links.some(l=>(l.source.id===d.id&&l.target.id===n.id)||(l.target.id===d.id&&l.source.id===n.id))
          ? 0.95 : 0.15);
    })
    .on('mousemove', moveTip)
    .on('mouseout', () => {
      hideTip();
      link.attr('stroke-opacity', 0.5).attr('stroke', '#2a2a5a');
      node.attr('fill-opacity', d => d.type==='project' ? 0.85 : 0.6);
    })
    .on('click', (evt, d) => { if (d.url) window.open(d.url, '_blank'); });

  labelG.selectAll('text')
    .data(showLabels ? nodes.filter(n=>n.type==='project') : [], d => d.id)
    .join('text')
    .text(d => d.label)
    .attr('font-size', '6px')
    .attr('fill', '#ccccee')
    .attr('pointer-events', 'none')
    .attr('dy', d => -d.r - 1);

  // Physics tuned for large (4000+) node counts
  simulation = d3.forceSimulation(nodes)
    .force('link',   d3.forceLink(links).id(d=>d.id)
                       .distance(d => d.source.type==='project' ? 55 : 40)
                       .strength(0.35))
    .force('charge', d3.forceManyBody().strength(d => d.type==='project' ? -80 : -35)
                       .distanceMax(300))
    .force('collide', d3.forceCollide(d => d.type==='project' ? 6 : 3))
    .force('center',  d3.forceCenter(W/2, H/2).strength(0.06))
    .force('x',       d3.forceX(W/2).strength(0.04))
    .force('y',       d3.forceY(H/2).strength(0.04))
    .alphaDecay(0.03)
    .on('tick', () => {
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
          .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      node.attr('cx',d=>d.x).attr('cy',d=>d.y);
      labelG.selectAll('text').attr('x',d=>d.x).attr('y',d=>d.y);
    })
    .on('end', fitView);
}

// ═══════════════════════════════════════════════════════════════
//  Project list panel
// ═══════════════════════════════════════════════════════════════
function updateProjectList(projects) {
  const title = document.getElementById('proj-panel-title');
  const list  = document.getElementById('proj-list');
  title.textContent = `Projects in view (${projects.length})`;
  list.innerHTML = '';
  [...projects]
    .sort((a, b) => (a.title_en || '').localeCompare(b.title_en || ''))
    .forEach(p => {
      const item  = document.createElement('div');
      item.className = 'proj-item';
      const color = fundColor(p.funding_scheme);
      const start = (p.start_date || '').slice(0, 4);
      const end   = (p.end_date   || '').slice(0, 4);
      item.innerHTML = `
        <div class="proj-title">
          <span class="proj-dot" style="background:${color}"></span>${escHtml(p.title_en || p.project_id)}
        </div>
        <div class="proj-meta">${escHtml(p._pi_institution || '—')} · ${start}–${end}</div>`;
      if (p.project_page_url) {
        item.addEventListener('click', () => window.open(p.project_page_url, '_blank'));
      }
      list.appendChild(item);
    });
}

document.getElementById('proj-dl-btn').addEventListener('click', () => {
  const projects = filterProjects();
  const header = ['project_id','title','funding_scheme','start_date','end_date',
                  'pi_name','pi_institution','matched_keywords','nwo_url'];
  const rows = projects.map(p => [
    p.project_id,
    p.title_en,
    p.funding_scheme,
    (p.start_date || '').slice(0, 10),
    (p.end_date   || '').slice(0, 10),
    p._pi_name,
    p._pi_institution,
    matchTerms(p).join('; '),
    p.project_page_url,
  ].map(v => `"${String(v || '').replace(/"/g, '""')}"`).join(','));
  const csv  = [header.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'nwo_textile_projects.csv';
  a.click();
  URL.revokeObjectURL(a.href);
});

function fitView() {
  const nodes = nodeG.selectAll('circle').data();
  if (!nodes.length) return;
  const pad = 40;
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  nodes.forEach(n => {
    x0=Math.min(x0,n.x-n.r); y0=Math.min(y0,n.y-n.r);
    x1=Math.max(x1,n.x+n.r); y1=Math.max(y1,n.y+n.r);
  });
  const W = svg.node().clientWidth || 900, H = svg.node().clientHeight || 600;
  const bW=x1-x0||1, bH=y1-y0||1;
  const scale = Math.min(0.95, Math.min((W-pad*2)/bW, (H-pad*2)/bH));
  const tx = W/2 - scale*(x0+bW/2), ty = H/2 - scale*(y0+bH/2);
  svg.transition().duration(800)
    .call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

// ═══════════════════════════════════════════════════════════════
//  Load
// ═══════════════════════════════════════════════════════════════
async function autoLoad() {
  for (const url of ['nwo_textile_raw.json', './nwo_textile_raw.json']) {
    try {
      document.getElementById('loading-msg').textContent = `Fetching ${url}…`;
      const resp = await fetch(url);
      if (!resp.ok) continue;
      document.getElementById('loading-msg').textContent = 'Parsing JSON…';
      const raw = await resp.json();
      document.getElementById('loading-msg').textContent = `Annotating ${raw.length} projects…`;
      await new Promise(r => setTimeout(r, 30));
      allProjects = annotate(raw);
      buildKwChecks();
      buildFundFilters();
      document.getElementById('loading').style.display = 'none';
      render();
      return;
    } catch(_) {}
  }
  document.getElementById('loading').innerHTML =
    '<p style="color:#e53935">Could not load nwo_textile_raw.json.<br>Serve this file over HTTP alongside the HTML.</p>';
}
autoLoad();

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
